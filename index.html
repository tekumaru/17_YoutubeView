<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube一覧</title>

    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
        background: #f0f2f5;
      }

      .header {
        background: #ff0000;
        color: white;
        padding: 15px;
        text-align: center;
        font-weight: bold;
        font-size: 18px;
      }

      .container {
        padding: 15px;
      }

      .card {
        background: white;
        border-radius: 12px;
        margin-bottom: 12px;
        overflow: hidden;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
        transition: transform 0.1s;
      }

      .card:active {
        transform: scale(0.97);
      }

      .card-body {
        padding: 15px;
        font-size: 14px;
        color: #333;
      }

      .card a {
        text-decoration: none;
        color: inherit;
        display: block;
      }
    </style>
  </head>

  <body>
    <div class="header">YouTube一覧</div>

    <div class="container">
      <div id="list"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
